version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./assets:/app/assets
      - ./.planning:/app/.planning
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=true
      - UPLOAD_DIR=/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend wird in Plan 03 hinzugefügt
